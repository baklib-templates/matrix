pages:
  name: "Directify 导航站"
  slug: "index"
  template_name: "index"
  settings:
    hero_html: |
      <section class="relative overflow-hidden rounded-2xl mb-8 border border-base-300/20 bg-base-200/40">
        <div class="absolute inset-0 bg-cover bg-center opacity-90" style="background-image: url('images/hero.jpg');"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/85 via-slate-900/70 to-slate-900/40"></div>
        <div class="relative max-w-5xl mx-auto px-6 py-16 md:py-20 text-white">
          <p class="text-sm font-medium uppercase tracking-widest text-teal-300/90 mb-3">Baklib · Directify</p>
          <h1 class="text-3xl md:text-4xl font-bold leading-tight mb-4">常用头部站点导航</h1>
          <p class="text-lg text-white/85 max-w-2xl mb-8">收录 Google、OpenAI、微软、苹果、百度、阿里云、腾讯等品牌官方入口，配合栏目与卡片快速跳转。</p>
          <div class="flex flex-wrap gap-3">
            <a href="/search" class="btn btn-primary btn-sm md:btn-md">搜索引擎</a>
            <a href="/ai" class="btn btn-outline btn-sm md:btn-md border-white/40 text-white hover:bg-white/10">AI 与智能</a>
            <a href="/cn-cloud" class="btn btn-outline btn-sm md:btn-md border-white/40 text-white hover:bg-white/10">中国云与互联网</a>
          </div>
        </div>
      </section>

  children:
    - name: "搜索引擎"
      slug: "search"
      template_name: "channel"
      settings:
        title: "搜索引擎"
        description: "全球与中国主流搜索入口，便于检索与发现。"
        content: |
          <p>本栏目收录 <strong>Google</strong> 与 <strong>百度</strong> 的官方站点。搜索服务可能因地区与合规策略存在差异，请以各站说明为准。</p>
      children:
        - name: "Google"
          slug: "google"
          template_name: "page"
          settings:
            title: "Google"
            brand_name: "Google LLC"
            description: "全球使用广泛的搜索引擎与广告、云与生产力产品矩阵。"
            version: "入口"
            original_url: "https://www.google.com"
            content: |
              <p>Google 提供网页搜索、图片、视频与地图等服务，并延伸至 Android、Chrome、Workspace 与 Google Cloud 等产品线。</p>
              <p>演示说明：点击顶栏「外链」或使用页面侧栏外链按钮可前往官网（需在主题中启用外链展示）。</p>
          children:
            - name: "站内笔记：Google 检索提示"
              slug: "google-notes"
              template_name: "post"
              settings:
                title: "站内笔记：Google 检索提示"
                description: "演示 page → post 层级与富文本内容。"
                content_type: "0"
                content: |
                  <p>在 Google 搜索框中可尝试使用引号精确匹配，例如 <code>"Baklib CMS"</code>。</p>
                  <p>使用 <code>site:example.com</code> 可限定在指定域名内检索。</p>

        - name: "百度"
          slug: "baidu"
          template_name: "page"
          settings:
            title: "百度"
            brand_name: "百度"
            description: "中文搜索与信息流、智能云、自动驾驶等综合科技服务。"
            version: "入口"
            original_url: "https://www.baidu.com"
            content: |
              <p>百度是中国领先的搜索引擎与人工智能公司，业务覆盖搜索推广、智能云、自动驾驶（Apollo）与内容生态等。</p>
              <p>本页为演示数据，用于展示栏目下的站点卡片与描述字段。</p>

    - name: "AI 与智能"
      slug: "ai"
      template_name: "channel"
      settings:
        title: "AI 与智能"
        description: "全球 AI 与智能云代表品牌入口。"
        content: |
          <p>本栏目收录 <strong>OpenAI</strong> 与 <strong>微软（Microsoft）</strong>。前者以生成式 AI 研究与应用著称，后者提供 Azure、Microsoft 365 与 Copilot 等企业级能力。</p>
      children:
        - name: "OpenAI"
          slug: "openai"
          template_name: "page"
          settings:
            title: "OpenAI"
            brand_name: "OpenAI"
            description: "人工智能研究与 ChatGPT、API 等产品。"
            version: "入口"
            original_url: "https://openai.com"
            content: |
              <p>OpenAI 聚焦通用人工智能研究，面向开发者与企业提供模型 API，并向用户提供 ChatGPT 等对话产品。</p>
              <ul>
                <li>模型与能力以官网文档为准</li>
                <li>企业部署需关注区域合规与数据策略</li>
              </ul>

        - name: "微软"
          slug: "microsoft"
          template_name: "page"
          settings:
            title: "微软"
            brand_name: "Microsoft"
            description: "Windows、Microsoft 365、Azure 与 Copilot 等企业级云与生产力平台。"
            version: "入口"
            original_url: "https://www.microsoft.com"
            content: |
              <p>微软提供从操作系统、办公协作到公有云 Azure 的完整栈，并在全线产品中集成 Copilot 智能助手能力。</p>
              <p>演示站点将微软与 OpenAI 同列于「AI 与智能」栏目，便于对比查阅。</p>

    - name: "消费与生态"
      slug: "consumer"
      template_name: "channel"
      settings:
        title: "消费与生态"
        description: "消费电子、软件与全球开发者生态。"
        content: |
          <p>本栏目收录 <strong>苹果（Apple）</strong>，覆盖 iPhone、Mac、iPad、软件服务与开发者生态。</p>
      children:
        - name: "苹果"
          slug: "apple"
          template_name: "page"
          settings:
            title: "苹果"
            brand_name: "Apple Inc."
            description: "iPhone、Mac、iPad、Apple Watch、软件服务与开发者生态。"
            version: "入口"
            original_url: "https://www.apple.com"
            logo_url: "https://www.apple.com/favicon.ico"
            content: |
              <p>Apple 设计并销售消费电子与软件服务，其生态涵盖硬件、操作系统、App Store 与隐私安全体系。</p>
              <p>种子中 <code>logo_url</code> 使用官网 favicon 外链，演示 LOGO 区展示（若主题允许外链图片）。</p>

    - name: "中国云与互联网"
      slug: "cn-cloud"
      template_name: "channel"
      settings:
        title: "中国云与互联网"
        description: "中国领先的云计算与互联网综合服务。"
        content: |
          <p>本栏目收录 <strong>阿里云</strong> 与 <strong>腾讯</strong>，分别代表企业数字化与云基础设施、以及社交、游戏、金融科技等多元业务。</p>
      children:
        - name: "阿里云"
          slug: "aliyun"
          template_name: "page"
          settings:
            title: "阿里云"
            brand_name: "阿里云"
            description: "企业级云计算与数据智能服务。"
            version: "入口"
            original_url: "https://www.aliyun.com"
            content: |
              <p>阿里云提供计算、存储、网络、数据库、大数据与人工智能等云服务，服务政企与开发者客户。</p>
              <p>适合作为「中国云」类目的代表性入口页面。</p>

        - name: "腾讯"
          slug: "tencent"
          template_name: "page"
          settings:
            title: "腾讯"
            brand_name: "腾讯"
            description: "社交、游戏、金融科技、云与智慧产业等综合服务。"
            version: "入口"
            original_url: "https://www.tencent.com"
            content: |
              <p>腾讯旗下涵盖微信与 QQ 等社交产品、游戏与数字内容、金融科技以及腾讯云等 ToB 业务。</p>
              <p>与阿里云并列，便于在导航站中对比两家头部互联网公司的官网入口。</p>
