pages:
  name: "Matrix 旗舰主题演示站"
  slug: "index"
  template_name: "index"
  settings:
    hero_html: |
      <section class="relative overflow-hidden rounded-2xl mb-8 border border-base-300/20 bg-base-200/40">
        <div class="absolute inset-0 bg-cover bg-center opacity-90" style="background-image: url('images/hero.jpg');"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/85 via-slate-900/70 to-slate-900/40"></div>
        <div class="relative max-w-5xl mx-auto px-6 py-16 md:py-20 text-white">
          <p class="text-sm font-medium uppercase tracking-widest text-teal-300/90 mb-3">Baklib · Matrix</p>
          <h1 class="text-3xl md:text-5xl font-bold leading-tight mb-4">基于 CaaS 理念的全场景实体资产引擎</h1>
          <p class="text-lg text-white/85 max-w-2xl mb-8">一套核心模板，通过 Mode 切换 6 种业务形态：Partners / Products / Videos / Podcasts / Events / Jobs。</p>
          <div class="flex flex-wrap gap-3">
            <a href="/products" class="btn btn-primary btn-sm md:btn-md">Products</a>
            <a href="/videos" class="btn btn-outline btn-sm md:btn-md border-white/40 text-white hover:bg-white/10">Videos</a>
            <a href="/events" class="btn btn-outline btn-sm md:btn-md border-white/40 text-white hover:bg-white/10">Events</a>
          </div>
        </div>
      </section>

  children:
    - name: "Products"
      slug: "products"
      template_name: "channel"
      settings:
        title: "Products"
        description: "产品选型中心（Grid 1:1）"
        content: |
          <p>建议把每个产品作为一个 <code>page</code>，并在页面设置里填参数、库存与 CTA。</p>
      children:
        - name: "Matrix Laptop"
          slug: "matrix-laptop"
          template_name: "page"
          settings:
            title: "Matrix Laptop"
            description: "轻薄高性能旗舰笔记本，适合移动办公与创作。"
            tags: ["Laptop", "旗舰", "16GB"]
            logo_url: "images/thumb.png"
            inventory_status: "InStock"
            cta_label: "咨询/购买"
            cta_url: "https://example.com/buy"
            specs_json: |
              CPU: M-Next 12C
              RAM: 16GB
              Storage: 1TB SSD
              Weight: 1.2kg
            content: |
              <p>这是一个产品详情页示例。你可以在正文里写卖点、FAQ、以及对比说明。</p>

        - name: "Matrix Camera"
          slug: "matrix-camera"
          template_name: "page"
          settings:
            title: "Matrix Camera"
            description: "专业级影像系统，面向视频创作者与活动直播。"
            tags: ["Camera", "Creator"]
            logo_url: "images/thumb.png"
            inventory_status: "OutOfStock"
            cta_label: "预约到货"
            specs_json: |
              Sensor: 1-inch
              Stabilization: OIS+EIS
              Video: 4K60
            content: |
              <p>演示库存状态与参数表。</p>

    - name: "Videos"
      slug: "videos"
      template_name: "channel"
      settings:
        title: "Videos"
        description: "视频/流媒体站（Grid 16:9，Hover 预览）"
        content: |
          <p>每条视频也是一个 <code>page</code>，用 <code>video_url</code> 指向 mp4 或可嵌入地址。</p>
      children:
        - name: "Product Demo"
          slug: "product-demo"
          template_name: "page"
          settings:
            title: "Product Demo"
            description: "新品演示视频：核心功能与场景落地。"
            tags: ["Demo", "Launch"]
            video_url: "https://example.com/demo.mp4"
            related_products_paths: |
              /products/matrix-laptop
              /products/matrix-camera
            content: |
              <p>演示顶部大屏播放器 + 关联产品卡片。</p>

        - name: "Behind the Scenes"
          slug: "bts"
          template_name: "page"
          settings:
            title: "Behind the Scenes"
            description: "幕后花絮：拍摄与制作流程。"
            tags: ["BTS"]
            video_url: "https://example.com/bts.mp4"
            content: |
              <p>演示另一条视频条目。</p>

    - name: "Podcasts"
      slug: "podcasts"
      template_name: "channel"
      settings:
        title: "Podcasts"
        description: "播客/音频站（Audio List + Transcript）"
        content: |
          <p>每期播客作为一个 <code>page</code>，用 <code>audio_url</code>、<code>audio_duration</code>、<code>transcript</code> 承载信息。</p>
      children:
        - name: "Episode 01"
          slug: "episode-01"
          template_name: "page"
          settings:
            title: "Episode 01"
            description: "从 CaaS 到 Matrix：如何把内容变成可运营资产。"
            tags: ["CaaS", "内容运营"]
            audio_url: "https://example.com/episode-01.mp3"
            audio_duration: "38:12"
            transcript: |
              <p><strong>主持人</strong>：欢迎收听 Matrix。</p>
              <p><strong>嘉宾</strong>：我们从 CaaS 的角度谈谈“实体资产引擎”。</p>
            content: |
              <p>演示详情页播放器与 transcript 区域。</p>

        - name: "Episode 02"
          slug: "episode-02"
          template_name: "page"
          settings:
            title: "Episode 02"
            description: "6 种 Mode 的信息架构：如何用一套模板覆盖不同业务。"
            tags: ["IA", "Mode"]
            audio_url: "https://example.com/episode-02.mp3"
            audio_duration: "42:05"
            content: |
              <p>演示另一条播客条目。</p>

    - name: "Events"
      slug: "events"
      template_name: "channel"
      settings:
        title: "Events"
        description: "活动/展会中心（Timeline + Agenda + Calendar）"
        content: |
          <p>活动条目建议填写开始/结束时间（ISO 或 YYYY-MM-DD），以及 <code>agenda_md</code>（每行：时间 | 议程）。</p>
      children:
        - name: "Matrix Summit 2026"
          slug: "matrix-summit-2026"
          template_name: "page"
          settings:
            title: "Matrix Summit 2026"
            description: "旗舰主题发布会：产品、内容与增长全链路。"
            tags: ["Summit", "发布会"]
            location: "上海"
            event_start_at: "2026-06-18"
            event_end_at: "2026-06-18"
            agenda_md: |
              10:00 | 开场与主题演讲
              11:00 | 产品演示：6 Mode 统一架构
              14:00 | 圆桌：内容资产化
            content: |
              <p>演示时间轴状态、添加到日历与 Agenda。</p>

        - name: "Roadshow"
          slug: "roadshow"
          template_name: "page"
          settings:
            title: "Roadshow"
            description: "区域巡展：客户案例与现场体验。"
            tags: ["Roadshow"]
            location: "深圳"
            event_start_at: "2026-08-01"
            event_end_at: "2026-08-01"
            content: |
              <p>演示另一条活动条目。</p>

    - name: "Jobs"
      slug: "jobs"
      template_name: "channel"
      settings:
        title: "Jobs"
        description: "招聘/雇主品牌（List 强调薪资/地点/发布时间）"
        content: |
          <p>职位条目建议填写 <code>salary_range</code>、<code>location</code>，并在详情页使用快速应聘弹窗。</p>
      children:
        - name: "Frontend Engineer"
          slug: "frontend-engineer"
          template_name: "page"
          settings:
            title: "Frontend Engineer"
            description: "负责 Matrix 主题的 Tailwind/Alpine 组件化与性能优化。"
            tags: ["Frontend", "Alpine", "Tailwind"]
            salary_range: "25k-45k"
            location: "上海/远程"
            cta_label: "快速应聘"
            content: |
              <p>演示 Jobs 详情页的侧边快速应聘与底部投递区。</p>

        - name: "Product Designer"
          slug: "product-designer"
          template_name: "page"
          settings:
            title: "Product Designer"
            description: "负责跨 Mode 的信息架构与组件规范设计。"
            tags: ["Design", "IA"]
            salary_range: "20k-35k"
            location: "深圳"
            cta_label: "投递简历"
            content: |
              <p>演示另一条职位条目。</p>

    - name: "Partners"
      slug: "partners"
      template_name: "channel"
      settings:
        title: "Partners"
        description: "合作伙伴门户（Logo-first Grid）"
        content: |
          <p>合作伙伴条目可以重点填写 Logo、简介与 CTA（申请合作/下载资料）。</p>
      children:
        - name: "Acme Studio"
          slug: "acme-studio"
          template_name: "page"
          settings:
            title: "Acme Studio"
            description: "内容策划与活动执行合作伙伴。"
            tags: ["Agency"]
            logo_url: "images/thumb.png"
            cta_label: "申请合作"
            cta_url: "https://example.com/partner"
            content: |
              <p>演示 Partners 详情页的合作入口 CTA。</p>

        - name: "Beta Labs"
          slug: "beta-labs"
          template_name: "page"
          settings:
            title: "Beta Labs"
            description: "产品共创与技术生态合作伙伴。"
            tags: ["Ecosystem", "CoBuild"]
            logo_url: "images/thumb.png"
            cta_label: "联系对接"
            content: |
              <p>CTA 未配置链接时，将走站内 Modal（可在后续统一表单逻辑）。</p>
